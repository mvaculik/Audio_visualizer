<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer</title>
  <meta name="description" content="Immersive audio visualizer with 5 modes, YouTube integration, and drag & drop support">
  <meta name="theme-color" content="#080810">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Canvas (fullscreen background) -->
  <canvas id="visualizer-canvas"></canvas>

  <!-- Ad overlay -->
  <div id="ad-overlay">
    <div class="ad-text">REKLAMA</div>
    <div class="ad-sub">wait for the music...</div>
  </div>

  <!-- Progress bar (top) -->
  <div id="progress-bar">
    <div class="fill"></div>
  </div>

  <!-- Song info (top center) -->
  <div id="song-info">
    <div class="song-name"></div>
    <div class="song-source"></div>
  </div>

  <!-- Intro overlay -->
  <div id="intro-overlay">
    <div class="intro-title">Audio Visualizer</div>
    <div class="intro-sub">Click anywhere to start</div>
  </div>

  <!-- Toast notifications -->
  <div id="toast"></div>

  <!-- Drag & drop overlay -->
  <div id="drop-overlay">
    <div class="drop-text">Drop audio file here</div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept="audio/*" multiple>

  <!-- YouTube player container (hidden) -->
  <div id="yt-player-container">
    <div id="yt-player"></div>
  </div>

  <!-- Playlist sidebar -->
  <div id="playlist-overlay"></div>
  <div id="playlist-sidebar">
    <div class="playlist-header">
      <h2>Playlist</h2>
      <div class="playlist-actions">
        <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-repeat" title="Repeat">
          <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-add-file" title="Add file">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-close-playlist" title="Close">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>
    <div class="playlist-tracks" id="playlist-tracks"></div>
  </div>

  <!-- Signature -->
  <div id="signature">V A C A</div>

  <!-- Control bar (bottom) -->
  <div id="control-bar">
    <!-- Playlist toggle -->
    <button class="ctrl-btn" id="btn-playlist" title="Playlist (L)">
      <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
    </button>

    <div class="ctrl-sep"></div>

    <!-- Prev -->
    <button class="ctrl-btn" id="btn-prev" title="Previous (P)">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>

    <!-- Play/Pause -->
    <button class="ctrl-btn" id="btn-play" title="Play/Pause (Space)">
      <svg viewBox="0 0 24 24" id="icon-play"><path d="M8 5v14l11-7z"/></svg>
      <svg viewBox="0 0 24 24" id="icon-pause" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <!-- Next -->
    <button class="ctrl-btn" id="btn-next" title="Next (N)">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>

    <div class="ctrl-sep"></div>

    <!-- Time -->
    <span class="time-display" id="time-current">0:00</span>

    <!-- Volume -->
    <div class="volume-wrap">
      <button class="ctrl-btn" id="btn-volume" title="Mute (M)" style="width:32px;height:32px">
        <svg viewBox="0 0 24 24" id="icon-vol-on"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg viewBox="0 0 24 24" id="icon-vol-off" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
      <input type="range" id="volume-slider" min="0" max="100" value="40">
    </div>

    <div class="ctrl-sep"></div>

    <!-- Mode selector -->
    <div class="mode-btns" id="mode-btns"></div>

    <div class="ctrl-sep"></div>

    <!-- HUD toggle -->
    <button class="ctrl-btn active" id="btn-hud" title="HUD Analytics (H)">
      <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5zm2 2h4v2H7V7zm0 4h10v2H7v-2zm0 4h7v2H7v-2zm6-8h4v2h-4V7z"/></svg>
    </button>

    <div class="ctrl-sep"></div>

    <!-- YouTube input -->
    <div class="yt-input-wrap">
      <input type="text" id="yt-url-input" placeholder="Paste YouTube URL...">
      <button class="ctrl-btn" id="btn-yt-load" title="Load YouTube" style="width:36px;height:36px;font-size:14px">
        <svg viewBox="0 0 24 24"><path d="M21.58 7.19c-.23-.86-.91-1.54-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42c-.86.23-1.54.91-1.77 1.77C2 8.75 2 12 2 12s0 3.25.42 4.81c.23.86.91 1.54 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42c.86-.23 1.54-.91 1.77-1.77C22 15.25 22 12 22 12s0-3.25-.42-4.81zM10 15V9l5.2 3-5.2 3z" fill="#f00"/></svg>
      </button>
    </div>
  </div>

  <!-- App script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
